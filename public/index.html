<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ticker Tactix Video Smusher</title>
    <link rel="icon" href="/brand/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <img class="brand-logo" src="/brand/logo-ticker-tactix-2026.png" alt="Ticker Tactix">
        <p class="eyebrow">Hosted Merge Utility</p>
        <h1><span>Video</span> Smusher</h1>
        <p class="lede">Choose one source video, select an intro and outro from the project assets, then download the finished MP4.</p>
      </header>

      <section class="panel" aria-labelledby="status-heading">
        <div class="section-heading">
          <h2 id="status-heading">Readiness</h2>
          <button class="secondary" id="refreshStatusButton" type="button">Refresh</button>
        </div>
        <div class="checks" id="statusChecks" aria-live="polite"></div>
      </section>

      <section class="panel" aria-labelledby="merge-heading">
        <div class="section-heading">
          <h2 id="merge-heading">Select Videos</h2>
          <button class="secondary" id="refreshAssetsButton" type="button">Reload Assets</button>
        </div>
        <form id="mergeForm">
          <div class="asset-grid">
            <label class="field" for="introSelect">
              <span>Intro video</span>
              <select id="introSelect" name="introFileId" required>
                <option value="">Loading intro videos...</option>
              </select>
            </label>

            <label class="field" for="outroSelect">
              <span>Outro video</span>
              <select id="outroSelect" name="outroFileId" required>
                <option value="">Loading outro videos...</option>
              </select>
            </label>
          </div>

          <label class="file-drop" for="sourceVideo">
            <span class="file-title">Source video</span>
            <span id="fileName">No file selected</span>
            <input id="sourceVideo" name="sourceVideo" type="file" accept="video/*,.mp4,.mov,.m4v,.avi,.mkv,.webm">
          </label>

          <button class="primary" id="mergeButton" type="submit" disabled>Merge Video</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="progress-heading">
        <h2 id="progress-heading">Progress</h2>
        <div class="progress-box" id="progressMessage" aria-live="polite">Ready when the checks pass and videos are selected.</div>
        <div class="error-box hidden" id="errorBox" role="alert"></div>
        <div class="success-box hidden" id="successBox"></div>
      </section>
    </main>

    <script src="/renderer.js"></script>
  </body>
</html>
